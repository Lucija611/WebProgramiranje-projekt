{% extends 'notes/base.html' %}
{% load static %}

{% block content %}
    <h1>Skripte</h1>

    <form method="get" class="search-form" id="search-form">
        <input type="text" name="query" id="search-input" value="{{ query }}" placeholder="Pretraži po kolegiju...">
        <button type="submit">Pretraži</button>
    </form>

    <div class="notes-grid" id="notes-grid">
        {% for note in notes %}
            {% include 'notes/note_card.html' %}
        {% empty %}
            <p>Nema rezultata.</p>
        {% endfor %}
    </div>

    <script src="{% static 'notes/js/search.js' %}"></script>
{% endblock %}
EOF
