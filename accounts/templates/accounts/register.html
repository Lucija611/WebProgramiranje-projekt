{% extends 'notes/base.html' %}
{% load static %}

{% block content %}
    <h1>Registracija</h1>

    <form method="post" id="register-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Registriraj se</button>
    </form>

    <p>Već imaš račun? <a href="{% url 'accounts:login' %}">Prijavi se</a></p>

    <script src="{% static 'notes/js/validate.js' %}"></script>
{% endblock %}
